<VirtualHost *:80>
    ServerName proxyff.local
    DocumentRoot /var/www/proxyff
    
    <Directory /var/www/proxyff>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/proxyff_error.log
    CustomLog ${APACHE_LOG_DIR}/proxyff_access.log combined
</VirtualHost>
